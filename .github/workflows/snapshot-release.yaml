name: Snapshot Release

on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  snapshot:
    name: Create snapshot release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          # This ensures we get the full git history for changesets
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create snapshot release
        id: snapshot
        run: |
          # Create a unique snapshot tag based on branch and timestamp
          BRANCH_NAME="${{ github.ref_name }}"
          SNAPSHOT_TAG="${BRANCH_NAME//\//-}"

          echo "Creating snapshot release with tag: $SNAPSHOT_TAG"
          echo "snapshot_tag=$SNAPSHOT_TAG" >> $GITHUB_OUTPUT

          # Create snapshot release
          pnpm exec changeset version --snapshot $SNAPSHOT_TAG

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages
        run: pnpm build

      - name: Authenticate npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish snapshot to npm
        run: |
          # Publish the snapshot packages
          pnpm changeset:publish --tag $SNAPSHOT_TAG
